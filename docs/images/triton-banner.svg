<svg width="1400" height="420" viewBox="0 0 1400 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Triton Coastal Intelligence">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050d1e" />
      <stop offset="55%" stop-color="#0a1e3d" />
      <stop offset="100%" stop-color="#0d2548" />
    </linearGradient>
    <linearGradient id="coast" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4b8" />
      <stop offset="50%" stop-color="#00a794" />
      <stop offset="100%" stop-color="#007a6e" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="420" fill="url(#bg)" />
  <path d="M-20 330 C 180 300, 220 250, 420 250 C 650 250, 710 315, 900 315 C 1080 315, 1160 255, 1420 275 L 1420 460 L -20 460 Z" fill="#082347" opacity="0.8" />
  <path d="M-20 360 C 170 330, 250 280, 420 280 C 630 280, 760 345, 900 345 C 1130 345, 1180 290, 1420 305 L 1420 460 L -20 460 Z" fill="#0d2548" opacity="0.85" />

  <path d="M120 245 C 350 155, 490 115, 710 145 C 930 175, 1060 140, 1260 120" stroke="url(#coast)" stroke-width="6" fill="none" filter="url(#softGlow)" />

  <circle cx="332" cy="188" r="7" fill="#ff3b5c" />
  <circle cx="410" cy="165" r="6" fill="#ff6b2b" />
  <circle cx="510" cy="152" r="6" fill="#f5a623" />
  <circle cx="675" cy="154" r="6" fill="#00e676" />
  <circle cx="886" cy="170" r="6" fill="#f5a623" />
  <circle cx="1036" cy="153" r="7" fill="#ff3b5c" />

  <text x="90" y="105" fill="#e8f2ff" font-family="Inter, Segoe UI, sans-serif" font-size="50" font-weight="700">TRITON COASTAL INTELLIGENCE</text>
  <text x="92" y="145" fill="#88b8d7" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="500">Florida's Coastal Intelligence Platform</text>

  <g transform="translate(92 182)">
    <rect x="0" y="0" width="250" height="32" rx="8" fill="#00d4b8" fill-opacity="0.12" stroke="#00d4b8" stroke-opacity="0.35" />
    <text x="15" y="22" fill="#00d4b8" font-family="JetBrains Mono, Consolas, monospace" font-size="16">JUPITER → KEY BISCAYNE</text>
  </g>

  <g transform="translate(360 182)">
    <rect x="0" y="0" width="202" height="32" rx="8" fill="#ff3b5c" fill-opacity="0.10" stroke="#ff3b5c" stroke-opacity="0.30" />
    <text x="16" y="22" fill="#ff8ca1" font-family="JetBrains Mono, Consolas, monospace" font-size="16">23 MONITORED BEACHES</text>
  </g>
